name: banco_de_tiempo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  google_fonts: ^6.0.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo app.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/
